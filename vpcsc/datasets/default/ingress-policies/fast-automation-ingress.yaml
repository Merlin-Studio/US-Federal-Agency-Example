# Ingress: FAST Terraform automation
#
# Compliance:
#   SOC 2: CC8.1 Change management — changes are authorized, tested, and implemented via IaC
#   FedRAMP: CM-3 Configuration Change Control — IaC automation as the controlled change mechanism
#   SOX: ITGC: Change management — all infrastructure changes via auditable IaC pipeline

from:
  identities:
  - $iam_principals:service_accounts/iac-0/iac-org-rw
  - $iam_principals:service_accounts/iac-0/iac-vpcsc-rw
  - $iam_principals:service_accounts/iac-0/iac-networking-rw
  - $iam_principals:service_accounts/iac-0/iac-security-rw
  - $iam_principals:service_accounts/iac-0/iac-pf-rw
  - $iam_principals:service_accounts/iac-0/terraform-org-sa
  - $iam_principals:service_accounts/iac-0/terraform-network-sa
  - $iam_principals:service_accounts/iac-0/terraform-security-sa
  - $iam_principals:service_accounts/iac-0/cicd-deploy-sa
  - $iam_principals:service_accounts/iac-0/security-scanner-sa
  sources:
  - access_level: fast-automation
to:
  operations:
  - method_selectors:
    - '*'
    service_name: '*'
  resources:
  - '*'
