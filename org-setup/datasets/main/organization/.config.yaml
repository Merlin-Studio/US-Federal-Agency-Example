# Organization-level configuration

id: $defaults:organization/id
contacts:
  cloudteam@acme.com:
  - ALL
iam_by_principals:
  $iam_principals:gcp-org-admin:
  - roles/resourcemanager.organizationAdmin
  $iam_principals:gcp-billing-admin:
  - roles/billing.admin
  $iam_principals:gcp-network-admin:
  - roles/compute.networkAdmin
  - roles/compute.securityAdmin
  $iam_principals:gcp-security-admin:
  - roles/iam.securityAdmin
  - roles/accesscontextmanager.policyAdmin
  $iam_principals:gcp-audit-viewer:
  - roles/iam.securityReviewer
  - roles/logging.viewer
  $iam_principals:gcp-support-admin:
  - roles/cloudsupport.techSupportEditor
  $iam_principals:service_accounts/iac-0/terraform-org-sa:
  - roles/resourcemanager.organizationAdmin
  $iam_principals:service_accounts/iac-0/terraform-network-sa:
  - roles/compute.networkAdmin
  - roles/compute.securityAdmin
  - roles/dns.admin
  $iam_principals:service_accounts/iac-0/terraform-security-sa:
  - roles/resourcemanager.organizationAdmin
  $iam_principals:service_accounts/iac-0/cicd-deploy-sa:
  - roles/clouddeploy.operator
  - roles/cloudbuild.builds.editor
  - roles/artifactregistry.writer
  $iam_principals:service_accounts/iac-0/security-scanner-sa:
  - roles/iam.securityReviewer
  - roles/securitycenter.sourcesViewer
logging:
  storage_location: $locations:primary
  sinks:
    org-audit-sink:
      destination: bigquery.googleapis.com/projects/$project_ids:log-0/datasets/org-audit-sink
      filter: logName:"cloudaudit.googleapis.com"
    org-security-sink:
      destination: pubsub.googleapis.com/projects/$project_ids:log-0/topics/org-security-sink
      filter: severity>=WARNING
    org-archive-sink:
      destination: storage.googleapis.com/$storage_buckets:log-0/org-archive-sink
data_access_logs:
  sts.googleapis.com:
    ADMIN_READ: {}
iam:
  roles/billing.creator: []
